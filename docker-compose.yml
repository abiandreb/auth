version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: auth-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_SA_PASSWORD}" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - auth-network

  api:
    build:
      context: ./Auth.API
      dockerfile: Dockerfile
    container_name: auth-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AuthDb;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__AccessTokenExpirationMinutes=15
      - JwtSettings__RefreshTokenExpirationDays=7
      - GitHubOAuth__ClientId=${GITHUB_CLIENT_ID}
      - GitHubOAuth__ClientSecret=${GITHUB_CLIENT_SECRET}
      - GitHubOAuth__RedirectUri=http://localhost:5000/api/auth/github/callback
      - Cors__AllowedOrigins__0=http://localhost:3000
    ports:
      - "5000:8080"
    networks:
      - auth-network

  frontend:
    build:
      context: ./Auth.Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: auth-frontend
    depends_on:
      - api
    environment:
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "3000:80"
    networks:
      - auth-network

volumes:
  sqlserver_data:

networks:
  auth-network:
    driver: bridge
